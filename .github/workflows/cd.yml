name: CI/CD Pipeline
 
on:
  push:
    branches: [ main ]
 
env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/cd_docker_project
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/cd_docker_project:latest -t ${{ secrets.DOCKER_HUB_USERNAME }}/cd_docker_project:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cd_docker_project:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cd_docker_project:${{ github.sha }}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/cd_docker_project
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker image prune -f

